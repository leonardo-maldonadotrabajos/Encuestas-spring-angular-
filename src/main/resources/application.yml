spring:
  application:
    name: votaciones-api

  # ── Configuración de Base de Datos (Conectado a Neon en la Nube) ───────
 datasource:
    # Si la variable de entorno SPRING_DATASOURCE_URL existe, la usará; si no, usará la de Neon
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-young-bread-ai7gtncw-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:neondb_owner}
    password: ${SPRING_DATASOURCE_PASSWORD:npg_sTmS57DUpHxz}
    driver-class-name: org.postgresql.Driver
      
    hikari:
      pool-name: VotacionesPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  # ── Configuración de JPA / Hibernate ────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate 
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ── Migraciones Flyway ─────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    repair-at-start: true

# ── JWT ───────────────────────────────────────────────────────
jwt:
  secret: dW5hc2VuYWxzdXBlcnNlY3JldGF5bGFyZ2FjYW1iaWFtZWRlc3B1ZXNjaWJlcnRlYzIwMjY=
  expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 horas

# ── Servidor ──────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  error:
    include-stacktrace: never
    include-message: always

# ── Logging (Modo Desarrollo) ─────────────────────────────────
logging:
  level:
    root: INFO
    cibertec.edu: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.socket: DEBUG

---
# ── Perfil de Producción (Se activa automáticamente en Render) ──
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    hikari:
      maximum-pool-size: 50
  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    cibertec.edu: INFO
    org.springframework.security: WARN
    org.springframework.web.socket: WARN
